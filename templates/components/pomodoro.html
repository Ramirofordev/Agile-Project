<div class = "pomodoro-wrapper text-center mb-5">

    <h3 class = "mb-3">🍅 FOCUS MODE</h3>

    <div class = "pomodoro-container">

        <svg class = "progress-ring" width = "220" height = "220">
            <circle
                class = "progress-ring-bg"
                cx = "110"
                cy = "110"
                r = "100"
            />
            <circle
                class = "progress-ring-circle"
                cx = "110"
                cy = "110"
                r = "100"
            />
        </svg>

        <div class = "pomodoro-time" id = "pomodoro-time">
            25:00
        </div>

        <div class = "pomodoro-phase" id = "pomodoro-phase">
            Focus
        </div>
    </div>

    <div class = "mt-4">

        <select id = "pomodoro-duration" class = "form-select w-auto d-inline">
            <option value = "25">25 min</option>
            <option value = "30">30 min</option>
            <option value = "45">45 min</option>
        </select>

        <button class = "btn btn-danger mx-2" id = "pomodoro-start">Start</button>
        <button class = "btn btn-secondary mx-2" id = "pomodoro-pause">Pause</button>
        <button class = "btn btn-outline-light mx-2" id = "pomodoro-reset">Reset</button>
    </div>

    <div class = "mt-3">
        Cycles completed: <span id = "cycle-count">0</span>
    </div>
</div>

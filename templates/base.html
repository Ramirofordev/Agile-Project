<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>Trainer Productivity</title>

        <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel = "stylesheet">
        <link rel = "stylesheet" href = "{{ url_for('static', filename = 'style.css') }}">
    </head>

    <body>

        <nav class = "navbar navbar-dark bg-dark px-4">
            <a href = "{{ url_for('index') }}" class = "navbar-brand">
                ⚔️ Trainer Productivity
            </a>
            <div>
                <a href = "{{ url_for('profile') }}" class = "text-white me-3 text-decoration-none">
                    👤 {{ current_user.username }}
                </a>
                <a href = "{{ url_for('logout') }}" class = "btn btn-outline-light btn-sm">Logout</a>
            </div>
        </nav>


        <div class = "container-fluid mt-5 px-4">
            {% block content %}{% endblock %}
        </div>

        <script src = "https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
        <script src="{{ url_for('static', filename='js/xp.js') }}"></script>
        <script src="{{ url_for('static', filename='js/capture.js') }}"></script>
        <script src="{{ url_for('static', filename='js/kanban.js') }}"></script>
        <script src="{{ url_for('static', filename='js/pomodoro.js') }}"></script>
    </body>
</html>

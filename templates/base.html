<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1">
        <meta name = "csrf-token" content = "{{ csrf_token() }}">
        <title>Trainer Productivity</title>

        <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel = "stylesheet">
        <link rel = "stylesheet" href = "{{ url_for('static', filename = 'style.css') }}">
    </head>

    <body>

        <nav class = "navbar navbar-expand-lg navbar-dark bg-dark px-3">
            <div class = "container-fluid">
                <a href = "{{ url_for('index') }}" class = "navbar-brand app-brand">
                    <span class = "brand-mark"></span>
                    <span class = "brand-text">Trainer Productivity</span>
                </a>

                <button class = "navbar-toggler" type = "button" data-bs-toggle = "collapse" data-bs-target = "#navbarNav">
                    Menu
                </button>

                <div class = "collapse navbar-collapse justify-content-end" id = "navbarNav">
                    <div class = "d-flex flex-column flex-lg-row gap-2">
                        <a href = "{{ url_for('profile') }}" class = "btn btn-outline-light btn-sm">
                            Trainer {{ current_user.username }}
                        </a>
                        <a href = "{{ url_for('list_projects') }}" class = "btn btn-outline-light btn-sm">
                            Projects
                        </a>
                        <a href = "{{ url_for('logout') }}" class = "btn btn-outline-light btn-sm">Logout</a>
                    </div>
                </div>
            </div>
        </nav>


        <div class = "container-fluid px-2 px-md-4">
            {% block content %}{% endblock %}
        </div>

        <script src = "https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
        <script src = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src = "{{ url_for('static', filename='js/xp.js') }}"></script>
        <script src = "{{ url_for('static', filename='js/capture.js') }}"></script>
        <script src = "{{ url_for('static', filename='js/kanban.js') }}"></script>
        <script src = "{{ url_for('static', filename='js/pomodoro.js') }}"></script>
    </body>
</html>

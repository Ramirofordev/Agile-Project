{% extends "base.html" %}

{% block content %}

<div class = "container mt-5">
    
    <h2 class = "text-center mb-4">📁 Your Projects</h2>
    
    <div class = "text-end mb-3">
        <button class = "btn btn-primary" data-bs-toggle="modal" data-bs-target="#createProjectModal">
            + New Project
        </button>
    </div>

    <div class = "modal fade" id = "createProjectModal" tabindex = "-1">
        <div class = "modal-dialog">
            <div class = "modal-content">

                <div class = "modal-header">
                    <h5 class = "modal-title">Create Project</h5>
                    <button type = "button" class = "btn-close" data-bs-dismiss="modal"></button>
                </div>

                <form action = "/projects" method = "POST">

                    <div class = "modal-body">

                        <input type = "text" name = "name" class = "form-control mb-3" placeholder = "Project name" required>

                        <input type = "text" name = "description" class = "form-control" placeholder = "Description">

                    </div>

                    <div class = "modal-footer">
                        <button class = "btn btn-secondary" data-bs-dismiss="modal">
                            Cancel
                        </button>
                        <button type = "submit" class = "btn btn-primary">
                            Create
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class = "row g-4">

        {% for project in projects %}
        <div class = "col-md-4">

            <div class = "card shadow-sm h-100">

                <div class = "card-body d-flex flex-column">
                    
                    <h5 class = "card-title">{{ project.name }}</h5>

                    <p class = "text-muted small">
                        {{ project.description or "No description" }}
                    </p>

                    <div class = "mb-3">
                        <span class = "badge bg-primary">
                            {{ project.total_tasks }} tasks
                        </span>

                        <span class = "badge bg-success">
                            {{ project.completed_tasks }} done  
                        </span>
                    </div>

                    <div class = "mt-auto">
                        <a href = "/projects/{{ project.id }}" class = "btn btn-outline-light w-100">
                            Open Project
                        </a>
                    </div>

                    <div class = "d-flex gap-2 mt-2">

                        <!-- EDIT -->
                        <button class = "btn btn-outline-warning btn-sm w-50" data-bs-toggle="modal" data-bs-target="#editProjectModal {{ project.id }}">
                            Edit
                        </button>
                        
                        <!-- DELETE -->
                        <form action = "/projects/delete/{{ project.id }}" method = "POST" class = "w-50">
                            <button class = "btn btn-outline-danger btn-sm w-100" onclick = "return confirm('Delete this project?')">
                                Delete
                            </button>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>

        <div class = "modal fade" id = "editProjectModal{{ project.id  }}" tabindex = "-1">
            <div class = "modal-dialog">
                <div class = "modal-content">

                    <div class = "modal-header">
                        <h5>Edit Project</h5>
                        <button class = "btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <form action = "/projects/edit{{ project.id }}" method = "POST">
                        <div class = "modal-body">
                            <input type = "text" name = "name" value = "{{ project.name }}" class = "form-control mb-3" required>

                            <input type = "text" name = "description" value = "{{ project.description }}" class = "form-control">
                        </div>
                        
                        <div class = "modal-footer">
                            <button class = "btn btn-secondary" data-bs-dismiss="modal">
                                Cancel
                            </button>

                            <button class = "btn btn-primary">
                                Save
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}

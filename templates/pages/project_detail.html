{% extends "base.html" %}

{% block content %}

<div class = "container mt-4">

    <div class = "text-center mb-3">
        <h2>📁 {{ project.name }}</h2>
        <p class = "text-muted">{{ project.description or "No description" }}</p>

        <div class = "row text-center mb-4">

            <div class="mb-3">

                <div class="progress" style="height: 10px;">
                    <div class="progress-bar 
                    {% if project.progress == 100 %}
                        bg-success
                    {% elif project.progress > 50 %}
                        bg-info
                    {% else %}
                        bg-warning
                    {% endif %}"
                    style="width: {{ project.progress }}%;">
                    </div>
                </div>

                <small class="text-muted">
                    {{ project.progress }}% ({{ project.completed_tasks }}/{{ project.total_tasks }}) completed
                </small>

            </div>
        </div>

        <a href = "/projects" class = "btn btn-outline-light btn-sm">
            <- Back to Projects
        </a>
    </div>
</div>

<hr class = "mb-4">

{% include "components/kanban_board.html" %}

{% endblock %}
